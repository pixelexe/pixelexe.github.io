<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirection en cours...</title>
    <script>
        // Fonction exécutée au chargement de la page
        window.onload = function() {
            // Vos deux liens
            const lien1 = "https://docs.google.com/forms/d/e/1FAIpQLSfs8jaAVTGJR9djmVki-fmdtyzgCEgaoIZAFvsznFx5V-hU_A/formResponse";
            const lien2 = "https://docs.google.com/forms/d/e/1FAIpQLSeI_v1gFjKzxyntw166ARTvbgtv0lDp_en4D7LmqmbMaqg_Eg/viewform";

            // Redirection aléatoire (1 chance sur 2)
            if (Math.random() < 0.5) {
                // Utilisation de replace() pour que l'utilisateur ne reste pas bloqué s'il clique sur "Retour"
                window.location.replace(lien1);
            } else {
                window.location.replace(lien2);
            }
        };
    </script>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
            color: #333;
        }
    </style>
</head>
<body>
    <p>Redirection en cours... Veuillez patienter.</p>
</body>
</html>
